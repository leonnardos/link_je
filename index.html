<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Poker | Agente Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #0B0F19;
            /* Fundo super escuro premium */
            background-image:
                radial-gradient(circle at 15% 50%, rgba(2, 132, 199, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 25%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 30px 20px;
            color: #F8FAFC;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* Logo e Header */
        .logo-container {
            position: relative;
            margin: 0 auto 25px auto;
            width: 130px;
            height: 130px;
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #0EA5E9;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.3);
            background-color: #1E293B;
            padding: 4px;
            object-fit: cover;
            object-position: center;
            z-index: 2;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130%;
            height: 130%;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.4) 0%, transparent 60%);
            z-index: 1;
            filter: blur(10px);
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes pulse-glow {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        h1 {
            font-size: 1.7rem;
            margin-bottom: 6px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.5px;
        }

        p.username {
            color: #94A3B8;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .badge {
            background: linear-gradient(135deg, #0284C7 0%, #0EA5E9 100%);
            color: #ffffff;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: inline-block;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        /* Seção de Links Principais */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 16px;
            text-decoration: none;
            color: #F8FAFC;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .link-btn.primary {
            background: #22C55E;
            /* Verde forte pro WhatsApp */
            border-color: #22C55E;
            color: #000000;
        }

        .link-btn.primary:hover {
            background: #16A34A;
            border-color: #16A34A;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
            transform: translateY(-3px);
            color: #FFFFFF;
        }

        .link-btn.secondary:hover {
            background: #0EA5E9;
            border-color: #0EA5E9;
            color: #FFFFFF;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4);
        }

        .link-btn:hover::before {
            transform: translateX(100%);
        }

        .link-btn i {
            margin-right: 12px;
            font-size: 1.4rem;
        }

        /* Footer */
        footer {
            margin-top: auto;
            font-size: 0.85rem;
            color: #64748B;
            padding-top: 30px;
        }

        footer span {
            display: block;
            margin-top: 5px;
            font-size: 0.75rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="file.jpg" alt="Interior Poker - Agente" class="logo">
        </div>

        <h1>Interior Poker</h1>
        <p class="username">@agente_jenilson</p>

        <div>
            <span class="badge">AGENTE AUTORIZADO</span>
        </div>

        <div class="links-container">
            <a href="https://wa.me/5519996810315" target="_blank" class="link-btn primary">
                <i class="fab fa-whatsapp"></i> Fale agora comigo
            </a>
            <a href="https://l.supremapoker.net/UnIsqtywkLb" target="_blank" class="link-btn secondary">
                Jogar na Suprema Poker
            </a>
            <a href="https://cacheta.app.link/qJuc9c" target="_blank" class="link-btn secondary">
                Jogar na Cacheta League
            </a>
        </div>

        <footer>
            &copy; 2026 Interior Poker
            <span>Jogue com responsabilidade. +18.</span>
        </footer>
    </div>

</body>

</html>
